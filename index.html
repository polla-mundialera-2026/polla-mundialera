<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Polla Mundialera 2026 · Historial</title>

<meta property="og:description" content="246 jugadores · 27 jornadas · evolución de posiciones, puntos y exactos. Busca tu nombre y compárate.">
<meta property="og:type" content="website">
<meta name="theme-color" content="#0E1B12">

<style>
:root{
  --campo:#0E1B12; --panel:#16261B; --panel2:#1C3023; --linea:#2E4A33;
  --tiza:#E8F3E4; --tiza2:#9DB8A0; --oro:#E4C13C; --rojo:#D64545;
}
*{margin:0;padding:0;box-sizing:border-box}
html{-webkit-text-size-adjust:100%}
body{background:var(--campo);color:var(--tiza);font-family:'Barlow',system-ui,sans-serif;font-size:15px;line-height:1.45}
.wrap{max-width:980px;margin:0 auto;padding:0 14px 60px}

/* marcador */
header{padding:26px 0 10px;border-bottom:3px solid var(--oro);margin-bottom:18px}
.eyebrow{font-family:'Barlow Condensed';font-weight:600;letter-spacing:.22em;color:var(--oro);font-size:13px;text-transform:uppercase}
h1{font-family:'Barlow Condensed';font-weight:800;font-size:clamp(34px,7vw,58px);line-height:.95;text-transform:uppercase;letter-spacing:.01em}
h1 span{color:var(--oro)}
.sub{color:var(--tiza2);margin-top:6px;font-size:14px}

/* podio */
.podio{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin:16px 0 6px}
.pcard{background:var(--panel);border:1px solid var(--linea);border-radius:10px;padding:12px 12px 10px;position:relative;overflow:hidden}
.pcard.oro{border-color:var(--oro)}
.pcard .lug{font-family:'Barlow Condensed';font-weight:800;font-size:30px;color:var(--oro);line-height:1}
.pcard.p2 .lug,.pcard.p3 .lug{color:var(--tiza2)}
.pcard .nom{font-weight:600;font-size:14px;margin:4px 0 2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.pcard .det{color:var(--tiza2);font-size:12.5px}
.pcard .premio{margin-top:6px;font-family:'Barlow Condensed';font-weight:800;font-size:17px;color:var(--oro);letter-spacing:.03em}
.pcard.p2 .premio,.pcard.p3 .premio{color:var(--tiza)}

/* selector */
.selbox{background:var(--panel);border:1px solid var(--linea);border-radius:12px;padding:12px;margin:16px 0}
.selbox label{font-family:'Barlow Condensed';font-weight:600;font-size:13px;letter-spacing:.14em;text-transform:uppercase;color:var(--tiza2)}
.searchrow{position:relative;margin-top:8px}
#search{width:100%;background:var(--campo);border:1px solid var(--linea);border-radius:8px;color:var(--tiza);padding:11px 12px;font-size:16px;font-family:'Barlow'}
#search:focus{outline:2px solid var(--oro);outline-offset:1px;border-color:transparent}
#sugs{position:absolute;top:calc(100% + 4px);left:0;right:0;background:var(--panel2);border:1px solid var(--linea);border-radius:8px;max-height:250px;overflow:auto;z-index:30;display:none}
#sugs button{display:flex;justify-content:space-between;width:100%;text-align:left;background:none;border:0;color:var(--tiza);padding:10px 12px;font-size:15px;font-family:'Barlow';cursor:pointer}
#sugs button:hover,#sugs button:focus{background:var(--linea);outline:none}
#sugs .pos{color:var(--tiza2);font-size:13px}
.chips{display:flex;flex-wrap:wrap;gap:8px;margin-top:10px}
.chip{display:flex;align-items:center;gap:7px;border-radius:7px;padding:6px 9px 6px 8px;font-size:13.5px;font-weight:600;background:var(--panel2);border:1px solid var(--linea);cursor:pointer}
.chip .cam{width:13px;height:13px;border-radius:3px 3px 5px 5px;clip-path:polygon(0 22%,22% 0,36% 0,50% 12%,64% 0,78% 0,100% 22%,84% 38%,84% 100%,16% 100%,16% 38%);flex:0 0 13px}
.chip .x{color:var(--tiza2);font-weight:400;font-size:15px;line-height:1}
.chip:hover .x{color:var(--rojo)}

/* tabs + chart */
.tabs{display:flex;gap:6px;overflow-x:auto;padding-bottom:4px;margin:14px 0 0;-webkit-overflow-scrolling:touch}
.tab{font-family:'Barlow Condensed';font-weight:600;font-size:15px;letter-spacing:.06em;text-transform:uppercase;background:var(--panel);color:var(--tiza2);border:1px solid var(--linea);border-radius:8px;padding:9px 13px;cursor:pointer;white-space:nowrap}
.tab.on{background:var(--oro);color:#1c1503;border-color:var(--oro)}
.chartbox{background:var(--panel);border:1px solid var(--linea);border-radius:12px;padding:14px 10px 8px;margin-top:10px}
.chartbox h2{font-family:'Barlow Condensed';font-weight:800;font-size:20px;letter-spacing:.04em;text-transform:uppercase;padding:0 6px 6px}
.chartbox h2 small{color:var(--tiza2);font-weight:600;font-size:12px;letter-spacing:.12em;display:block}
#chartwrap{position:relative;height:380px}
@media(max-width:640px){#chartwrap{height:330px}.podio{grid-template-columns:1fr;gap:8px}}

/* stat cards */
.stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:10px;margin:16px 0}
.scard{background:var(--panel);border:1px solid var(--linea);border-radius:10px;padding:11px 12px}
.scard .k{font-family:'Barlow Condensed';font-weight:600;font-size:12px;letter-spacing:.14em;text-transform:uppercase;color:var(--tiza2)}
.scard .v{font-family:'Barlow Condensed';font-weight:800;font-size:27px;line-height:1.15;margin-top:2px}
.scard .d{font-size:12.5px;color:var(--tiza2)}
.up{color:#6FD08C}.down{color:var(--rojo)}

/* tabla */
.tablabox{background:var(--panel);border:1px solid var(--linea);border-radius:12px;padding:14px;margin-top:22px}
.tablabox h2{font-family:'Barlow Condensed';font-weight:800;font-size:20px;letter-spacing:.04em;text-transform:uppercase;margin-bottom:8px}
#tsearch{width:100%;background:var(--campo);border:1px solid var(--linea);border-radius:8px;color:var(--tiza);padding:9px 12px;font-size:15px;margin-bottom:10px;font-family:'Barlow'}
table{width:100%;border-collapse:collapse;font-size:14px}
th{font-family:'Barlow Condensed';font-weight:600;font-size:12.5px;letter-spacing:.12em;text-transform:uppercase;color:var(--tiza2);text-align:left;padding:6px 8px;border-bottom:2px solid var(--linea)}
th.num,td.num{text-align:right;font-variant-numeric:tabular-nums}
td{padding:7px 8px;border-bottom:1px solid var(--linea)}
tbody tr{cursor:pointer}
tbody tr:hover{background:var(--panel2)}
td .mov{font-size:12px;margin-left:5px}
.notatxt{color:var(--tiza2);font-size:12.5px;margin-top:10px}
footer{margin-top:26px;color:var(--tiza2);font-size:12.5px;border-top:1px solid var(--linea);padding-top:14px}
footer strong{color:var(--tiza)}
</style>
</head>

const CAM = ['#E4C13C','#5BC0EB','#D64545','#F28C28','#6FD08C','#B983FF','#F26CA7','#E8F3E4'];
const XL = J.map(j => j.label);
const XF = J.map(j => j.fecha);

// ---------- estado ----------
let sel = [0,1,2];            // top 3 inicial
let tab = 'pos';
let chart = null;

const TABS = [
  ['pos','Posición','Evolución en el ranking','posición (1 = líder)'],
  ['pts','Puntos','Puntos acumulados','puntos'],
  ['dexa','Exactos por jornada','Resultados exactos ganados cada día','exactos del día'],
  ['exa','Exactos acumulados','Total de exactos','exactos'],
  ['gap','Distancia al líder','Puntos que te separan del primero','puntos de diferencia'],
];

// líder por jornada
const leader = Array.from({length:N},(_,i)=>Math.max(...P.map(p=>p.pts[i]??-1)));

function serie(p, t){
  if(t==='pos') return p.pos;
  if(t==='pts') return p.pts;
  if(t==='exa') return p.exa;
  if(t==='dexa') return p.exa.map((v,i)=> v==null?null : (i? (p.exa[i-1]==null?null:v-p.exa[i-1]) : v));
  if(t==='gap') return p.pts.map((v,i)=> v==null?null : leader[i]-v);
}

function esc(s){const d=document.createElement('div');d.textContent=s;return d.innerHTML}
const fmt = n => n==null ? '—' : n.toLocaleString('es-CL');

// ---------- podio ----------
const PREMIOS = ['$1.771.200','$442.800','$295.200'];
document.getElementById('podio').innerHTML = P.slice(0,3).map((p,i)=>`
  <div class="pcard ${i===0?'oro':'p'+(i+1)}">
    <div class="lug">${i+1}°</div>
    <div class="nom">${esc(p.name)}</div>
    <div class="det">${fmt(p.pts[N-1])} pts · ${fmt(p.exa[N-1])} exactos</div>
    <div class="premio">${PREMIOS[i]}</div>
  </div>`).join('');

document.getElementById('subinfo').textContent =
  `${P.length} participantes · ${N} jornadas registradas`;

// ---------- selector ----------
const search = document.getElementById('search');
const sugs = document.getElementById('sugs');
search.addEventListener('input', ()=>{
  const q = search.value.trim().toLowerCase();
  if(q.length<2){sugs.style.display='none';return}
  const hits = P.map((p,i)=>[p,i]).filter(([p])=>p.name.toLowerCase().includes(q)).slice(0,12);
  sugs.innerHTML = hits.map(([p,i])=>
    `<button data-i="${i}"><span>${esc(p.name)}</span><span class="pos">#${p.pos[N-1]??'—'}</span></button>`).join('')
    || '<button disabled>Sin resultados</button>';
  sugs.style.display='block';
});
sugs.addEventListener('click', e=>{
  const b = e.target.closest('button[data-i]');
  if(!b) return;
  addSel(+b.dataset.i);
  search.value=''; sugs.style.display='none';
});
document.addEventListener('click', e=>{ if(!e.target.closest('.searchrow')) sugs.style.display='none'; });

function addSel(i){
  if(sel.includes(i)) return;
  if(sel.length>=8) sel.shift();
  sel.push(i);
  render();
}
function rmSel(i){ sel = sel.filter(x=>x!==i); render(); }

function renderChips(){
  document.getElementById('chips').innerHTML = sel.map((i,k)=>`
    <button class="chip" data-i="${i}" title="Quitar">
      <span class="cam" style="background:${CAM[k%CAM.length]}"></span>
      ${esc(P[i].name)} <span class="x">×</span>
    </button>`).join('');
}
document.getElementById('chips').addEventListener('click', e=>{
  const c = e.target.closest('.chip'); if(c) rmSel(+c.dataset.i);
});

// ---------- tabs ----------
document.getElementById('tabs').innerHTML = TABS.map(([id,name])=>
  `<button class="tab" data-t="${id}">${name}</button>`).join('');
document.getElementById('tabs').addEventListener('click', e=>{
  const b=e.target.closest('.tab'); if(!b) return;
  tab=b.dataset.t; render();
});

// ---------- chart ----------
function renderChart(){
  const meta = TABS.find(t=>t[0]===tab);
  document.getElementById('ctitle').innerHTML = `${meta[2]}<small>${meta[3]}</small>`;
  const isBar = tab==='dexa';
  const dsets = sel.map((i,k)=>{
    const p = P[i], col = CAM[k%CAM.length];
    return {
      label: p.name, data: serie(p,tab),
      borderColor: col, backgroundColor: isBar? col+'CC' : col,
      borderWidth: 2.5, pointRadius: N>20?2:3, pointHoverRadius:5,
      tension:.25, spanGaps:true, fill:false,
      _est: p.est, _pl: p
    };
  });
  const opts = {
    responsive:true, maintainAspectRatio:false, animation:{duration:350},
    interaction:{mode:'index',intersect:false},
    plugins:{
      legend:{display:false},
      tooltip:{
        backgroundColor:'#0E1B12EE', borderColor:'#2E4A33', borderWidth:1,
        titleFont:{family:'Barlow Condensed',size:15,weight:'800'},
        bodyFont:{family:'Barlow',size:13},
        callbacks:{
          title: items=> items.length? `${XL[items[0].dataIndex]} · ${XF[items[0].dataIndex]}` : '',
          label: c=>{
            const est = c.dataset._est[c.dataIndex] ? ' ≈' : '';
            let extra='';
            if(tab==='pos'){ const p=c.dataset._pl; extra=` (${fmt(p.pts[c.dataIndex])} pts)`; }
            return ` ${c.dataset.label}: ${fmt(c.parsed.y)}${extra}${est}`;
          }
        }
      }
    },
    scales:{
      x:{grid:{color:'#2E4A3355'},ticks:{color:'#9DB8A0',font:{family:'Barlow Condensed',size:12},maxRotation:0,autoSkipPadding:8}},
      y:{
        reverse: tab==='pos',
        grid:{color:'#2E4A3355'},
        ticks:{color:'#9DB8A0',font:{family:'Barlow Condensed',size:12},precision:0},
        ...(tab==='pos'?{min:1}:{beginAtZero:true})
      }
    }
  };
  if(chart) chart.destroy();
  chart = new Chart(document.getElementById('chart'), {type:isBar?'bar':'line', data:{labels:XL, datasets:dsets}, options:opts});
}

// ---------- stats del primer seleccionado ----------
function renderStats(){
  const box = document.getElementById('stats');
  if(!sel.length){box.innerHTML='';return}
  const p = P[sel[0]];
  const posArr = p.pos.filter(v=>v!=null);
  const best = Math.min(...posArr), worst = Math.max(...posArr);
  const dPos = p.pos.map((v,i)=> i&&v!=null&&p.pos[i-1]!=null ? p.pos[i-1]-v : null);
  const up = Math.max(...dPos.filter(v=>v!=null), 0);
  const upJ = XL[dPos.indexOf(up)] || '—';
  const dExa = serie(p,'dexa');
  const mExa = Math.max(...dExa.filter(v=>v!=null), 0);
  const mExaJ = XL[dExa.indexOf(mExa)] || '—';
  const delta = (p.pos[0]!=null && p.pos[N-1]!=null) ? p.pos[0]-p.pos[N-1] : null;
  box.innerHTML = `
    <div class="scard"><div class="k">${esc(p.name.split(' ')[0])} · pos. final</div>
      <div class="v">#${fmt(p.pos[N-1])}</div>
      <div class="d">${delta==null?'':(delta>=0?`<span class="up">▲ ${delta}</span>`:`<span class="down">▼ ${-delta}</span>`)+' vs J1'}</div></div>
    <div class="scard"><div class="k">Puntos / exactos</div>
      <div class="v">${fmt(p.pts[N-1])} <span style="font-size:16px;color:var(--tiza2)">pts</span></div>
      <div class="d">${fmt(p.exa[N-1])} exactos</div></div>
    <div class="scard"><div class="k">Mejor / peor posición</div>
      <div class="v">#${fmt(best)} <span style="font-size:16px;color:var(--tiza2)">/ #${fmt(worst)}</span></div>
      <div class="d">a lo largo del torneo</div></div>
    <div class="scard"><div class="k">Mayor salto</div>
      <div class="v class="up"">▲ ${fmt(up)}</div>
      <div class="d">puestos en ${upJ}</div></div>
    <div class="scard"><div class="k">Mejor jornada</div>
      <div class="v">${fmt(mExa)} <span style="font-size:16px;color:var(--tiza2)">exactos</span></div>
      <div class="d">en ${mExaJ}</div></div>`;
}

// ---------- tabla ----------
function renderTable(filter=''){
  const q = filter.trim().toLowerCase();
  const rows = P.map((p,i)=>[p,i]).filter(([p])=>!q||p.name.toLowerCase().includes(q));
  document.getElementById('tbody').innerHTML = rows.map(([p,i])=>
    `<tr data-i="${i}"><td class="num">${fmt(p.pos[N-1])}</td><td>${esc(p.name)}</td>
      <td class="num">${fmt(p.pts[N-1])}</td><td class="num">${fmt(p.exa[N-1])}</td></tr>`).join('');
}
document.getElementById('tsearch').addEventListener('input', e=>renderTable(e.target.value));
document.getElementById('tbody').addEventListener('click', e=>{
  const tr = e.target.closest('tr[data-i]'); if(!tr) return;
  addSel(+tr.dataset.i);
  window.scrollTo({top:document.querySelector('.selbox').offsetTop-10,behavior:'smooth'});
});

// ---------- footer ----------
const estTot = P.reduce((a,p)=>a+p.est.reduce((x,y)=>x+y,0),0);
document.getElementById('foot').innerHTML = `
  <strong>Notas del procesamiento.</strong> Datos extraídos automáticamente de los pantallazos de WhatsApp de la tabla oficial (${N} jornadas, del 11 de junio al 9 de julio, ${P.length} participantes).
  Las posiciones salen del orden real de cada tabla. Un ${(100*estTot/(P.length*N*2)).toFixed(1)}% de las celdas de puntos/exactos no se pudo leer con certeza y fue interpolado entre jornadas vecinas (marcadas con ≈ en los tooltips).
  Ranking: puntos, con exactos como referencia de desempate.`;

// ---------- render ----------
function render(){
  document.querySelectorAll('.tab').forEach(b=>b.classList.toggle('on', b.dataset.t===tab));
  renderChips(); renderChart(); renderStats();
}
render(); renderTable();
</script>
</body>
</html>
